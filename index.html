<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1e3a5f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Trip Report" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Daily Trip Report</title>
    <script>
      // Lock screen to portrait orientation when PIN pad is shown
      window.lockToPortrait = function() {
        if (screen.orientation && screen.orientation.lock) {
          try {
            screen.orientation.lock('portrait-primary').catch(err => {
              console.log('Cannot lock orientation (may not be supported):', err);
            });
          } catch (e) {
            console.log('Orientation lock not available');
          }
        }
      };
      
      window.unlockOrientation = function() {
        if (screen.orientation && screen.orientation.unlock) {
          try {
            screen.orientation.unlock();
          } catch (e) {
            console.log('Cannot unlock orientation');
          }
        }
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
